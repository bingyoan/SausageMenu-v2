workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.sausagemenu.app"
      node: 18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node dependencies
        script: |
          npm install

      - name: Build Next.js static export
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App && pod install

      - name: Initialize keychain
        script: |
          keychain initialize

      - name: Fetch signing files and create if needed
        script: |
          # Generate a new RSA 2048 private key for certificate creation
          openssl genrsa 2048 2>/dev/null > /tmp/cert_key.pem
          # Export as environment variable for the CLI tool
          export CERTIFICATE_PRIVATE_KEY=$(cat /tmp/cert_key.pem)
          # Fetch or create signing files
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
