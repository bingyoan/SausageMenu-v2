workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      vars:
        XCODE_WORKSPACE: "SausageMenu-v2-main/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node dependencies
        script: |
          cd SausageMenu-v2-main && npm install

      - name: Build Next.js static export
        script: |
          cd SausageMenu-v2-main && npm run build

      - name: Sync Capacitor iOS
        script: |
          cd SausageMenu-v2-main && npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd SausageMenu-v2-main/ios/App && pod install

      - name: Fetch signing files and create if needed
        script: |
          app-store-connect fetch-signing-files "com.sausagemenu.app" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: |
          keychain initialize

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - SausageMenu-v2-main/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
